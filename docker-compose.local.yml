# Local container-based dev. Maps 3016:3016 so the browser can hit the
# containerized site directly. Requires a DATABASE_URL pointing at a
# reachable Postgres (the shared pritika-postgres if you're on the VM
# network, or a local instance via tunnel).

services:
  app:
    build: .
    container_name: focusroom-local
    ports:
      - "3016:3016"
    environment:
      NODE_ENV: production
      PORT: "3016"
      DATABASE_URL: "${DATABASE_URL:-}"
      AZURE_OPENAI_ENDPOINT: "${AZURE_OPENAI_ENDPOINT:-}"
      AZURE_OPENAI_DEPLOYMENT: "${AZURE_OPENAI_DEPLOYMENT:-gpt-4.1-mini}"
      FOCUSROOM_CONTENT_SAFETY_ENDPOINT: "${FOCUSROOM_CONTENT_SAFETY_ENDPOINT:-}"
      FOCUSROOM_DAILY_BUDGET_USD: "2"
