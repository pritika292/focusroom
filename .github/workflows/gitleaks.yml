name: gitleaks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# gitleaks/gitleaks-action now requires a paid license for org-owned repos
# and trips a "missing gitleaks license" failure even on personal accounts
# under certain GITHUB_TOKEN scopes. Run the OSS binary directly instead.
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.21.0"
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Scan repository history
        run: gitleaks detect --no-banner --redact --exit-code 1
