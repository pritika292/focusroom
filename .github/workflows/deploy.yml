name: deploy

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-focusroom
  cancel-in-progress: false

# Opt JavaScript actions onto the runner's Node 24 ahead of the June 2026
# forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Write deploy script
        # az vm run-command runs the script under sh (waagent), not bash.
        # Keep everything POSIX-compatible. The health check uses
        # `docker exec focusroom wget` because the container's port 3016
        # isn't exposed on the host, only on the pritika docker network.
        run: |
          cat > vm-deploy.sh <<'EOF'
          #!/bin/sh
          set -eu
          PROJECT=focusroom
          TARGET=/opt/pritika/${PROJECT}

          log() { printf '[deploy] %s\n' "$*"; }

          if [ ! -d "$TARGET/.git" ]; then
            log "First deploy -- cloning"
            git clone --depth 1 https://github.com/pritika292/${PROJECT}.git "$TARGET"
          else
            log "Pulling latest main"
            cd "$TARGET"
            git fetch --depth 1 origin main
            git reset --hard origin/main
          fi
          cd "$TARGET"

          if [ -x scripts/bootstrap-vm.sh ]; then
            log "Running bootstrap-vm.sh"
            bash scripts/bootstrap-vm.sh
          fi

          log "Building and restarting containers"
          docker compose pull --quiet 2>/dev/null || true
          docker compose up -d --build --remove-orphans

          log "Pruning dangling images"
          docker image prune -f >/dev/null 2>&1 || true

          # Give the container time to migrate + listen, then probe.
          i=0
          while [ $i -lt 45 ]; do
            if docker exec focusroom wget -qO- http://localhost:3016/health >/dev/null 2>&1; then
              log "Health check passed: /health returned 2xx"
              exit 0
            fi
            i=$((i + 1))
            sleep 2
          done
          log "ERROR: /health did not return 2xx after 90s"
          log "Container state:"
          docker compose ps
          log "Recent logs:"
          docker compose logs --tail=120 focusroom || true
          exit 1
          EOF

      - name: Deploy via az vm run-command
        # The VM is shared with controlroom, shortlive, pg-inspector, etc.
        # Only one `az vm run-command invoke` can be in-flight at a time
        # per VM; concurrent invocations get a 409 Conflict. Retry with
        # backoff so a sibling deploy that's just-finishing doesn't fail
        # this one. Up to ~7 minutes total wait before giving up.
        #
        # IMPORTANT: don't pipe az output through tee. Without
        # `set -o pipefail` the pipe's exit code is tee's (always 0),
        # masking az failures and short-circuiting the retry logic.
        # Write az stdout directly to a file with `>` so the `if`
        # checks az's actual exit code, then cat the file for the log.
        run: |
          set -eu

          attempts=8
          delay=20
          attempt=1
          ok=false
          while [ "$attempt" -le "$attempts" ]; do
            echo "[deploy] attempt $attempt of $attempts"
            if az vm run-command invoke \
                 --resource-group "${{ vars.AZURE_DEPLOY_RG }}" \
                 --name "${{ vars.AZURE_DEPLOY_VM_NAME }}" \
                 --command-id RunShellScript \
                 --scripts @vm-deploy.sh \
                 --query "value[0].message" -o tsv \
                 > deploy-output.log 2> az-error.log; then
              ok=true
              cat deploy-output.log
              break
            fi

            echo "[deploy] az error output:"
            cat az-error.log

            if grep -q "Run command extension execution is in progress" az-error.log; then
              echo "[deploy] another run-command is in-flight on the VM; sleeping ${delay}s and retrying"
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay + 20))
              continue
            fi

            echo "[deploy] non-retryable az error (see above); failing the deploy"
            exit 1
          done

          if [ "$ok" != "true" ]; then
            echo "::error::gave up after $attempts retries; the VM is busy with another deploy"
            exit 1
          fi

          if grep -q "Health check passed" deploy-output.log; then
            echo "::notice::focusroom deployed and healthy"
          else
            echo "::warning::Health probe did not confirm healthy state -- verify the VM manually"
            exit 1
          fi
